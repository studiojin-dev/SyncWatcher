name: Dispatch studiojin-home release notes

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Published stable release tag to sync to studiojin-home"
        required: true
        type: string

jobs:
  dispatch_release_notes:
    if: github.event_name != 'release' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve published stable release tag
        id: resolve_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "release" ]]; then
            echo "tag_name=${RELEASE_TAG_NAME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="${INPUT_TAG_NAME}"
          release_json="$(curl -fsSL \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "https://api.github.com/repos/${GH_REPO}/releases/tags/${tag}")"

          draft="$(jq -r '.draft' <<<"$release_json")"
          prerelease="$(jq -r '.prerelease' <<<"$release_json")"
          published_at="$(jq -r '.published_at' <<<"$release_json")"

          if [[ "$draft" != "false" || "$prerelease" != "false" || "$published_at" == "null" ]]; then
            echo "Manual sync only supports published stable releases. tag=${tag}, draft=${draft}, prerelease=${prerelease}, published_at=${published_at}" >&2
            exit 1
          fi

          echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"

      - name: Dispatch studiojin-home import workflow
        env:
          BLOG_REPO_DISPATCH_TOKEN: ${{ secrets.BLOG_REPO_DISPATCH_TOKEN }}
          TAG_NAME: ${{ steps.resolve_tag.outputs.tag_name }}
        run: |
          set -euo pipefail

          if [[ -z "${BLOG_REPO_DISPATCH_TOKEN:-}" ]]; then
            echo "Missing required secret BLOG_REPO_DISPATCH_TOKEN." >&2
            exit 1
          fi

          # BLOG_REPO_DISPATCH_TOKEN should be a fine-grained PAT scoped only to
          # kimjj81/studiojin-home with Actions: write. The homepage repo writes
          # its own content with its local GITHUB_TOKEN after this dispatch.
          curl -fsSL \
            -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${BLOG_REPO_DISPATCH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "https://api.github.com/repos/kimjj81/studiojin-home/actions/workflows/import-syncwatcher-release-notes.yml/dispatches" \
            -d @- <<EOF
          {"ref":"main","inputs":{"source_repo":"studiojin-dev/SyncWatcher","tag_name":"${TAG_NAME}"}}
          EOF
