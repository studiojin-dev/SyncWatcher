name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build and publish"
        required: true
        type: string
      reuse_published_release:
        description: "Allow manual recovery by reusing an already-published release for this tag"
        required: false
        default: false
        type: boolean

jobs:
  tag_gate:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check_tag.outputs.is_release }}
      is_prerelease: ${{ steps.check_tag.outputs.is_prerelease }}
      release_channel: ${{ steps.check_tag.outputs.release_channel }}
    steps:
      - name: Classify release tag
        id: check_tag
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          tag="${TAG_NAME}"
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_channel=stable" >> "$GITHUB_OUTPUT"
            echo "Stable release tag detected: $tag"
          elif [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta(\.[0-9]+)?$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "release_channel=beta" >> "$GITHUB_OUTPUT"
            echo "Beta pre-release tag detected: $tag"
          elif [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc([0-9]+|\.[0-9]+)?$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "release_channel=rc" >> "$GITHUB_OUTPUT"
            echo "RC pre-release tag detected: $tag"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_channel=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Log skip reason for non-release tag
        if: steps.check_tag.outputs.is_release == 'false'
        env:
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          echo "Skipping release job because tag is not release semver/beta/rc: ${TAG_NAME}"

  prepare_release:
    needs: tag_gate
    if: needs.tag_gate.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.ensure_release.outputs.release_id }}
      release_is_draft: ${{ steps.ensure_release.outputs.release_is_draft }}
      reused_published_release: ${{ steps.ensure_release.outputs.reused_published_release }}
    steps:
      - name: Ensure draft release exists
        id: ensure_release
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
          IS_PRERELEASE: ${{ needs.tag_gate.outputs.is_prerelease }}
          REUSE_PUBLISHED_RELEASE: ${{ inputs.reuse_published_release && 'true' || 'false' }}
        run: |
          set -euo pipefail

          release_id=""
          release_is_draft=""
          reused_published_release="false"
          release_json="$(gh release view "$TAG_NAME" --json id,isDraft,url 2>/dev/null || true)"
          if [[ -n "$release_json" ]]; then
            release_id="$(jq -r '.id' <<<"$release_json")"
            release_is_draft="$(jq -r '.isDraft' <<<"$release_json")"
            if [[ "$release_is_draft" == "true" ]]; then
              echo "Reusing existing draft release ${TAG_NAME} (${release_id})."
            elif [[ "$EVENT_NAME" == "workflow_dispatch" && "$REUSE_PUBLISHED_RELEASE" == "true" ]]; then
              reused_published_release="true"
              echo "Manual recovery enabled: reusing published release ${TAG_NAME} (${release_id})."
              echo "Existing assets for this tag may be replaced by the recovery run."
            else
              echo "Release ${TAG_NAME} is already published."
              if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
                echo "To rebuild this exact tag, manually re-run the workflow with reuse_published_release=true."
              else
                echo "Tag-push runs do not mutate published releases."
                echo "Cut and push a new patch tag, or run workflow_dispatch with reuse_published_release=true."
              fi
              exit 1
            fi
          else
            release_args=(
              --draft
              --title "SyncWatcher ${TAG_NAME}"
              --generate-notes
              --notes "Installer assets, updater metadata, checksums, and attestations are attached below."
            )
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              release_args+=(--prerelease)
            fi

            gh release create "$TAG_NAME" "${release_args[@]}" >/dev/null
            release_id="$(gh release view "$TAG_NAME" --json id --jq '.id')"
            release_is_draft="true"
            echo "Created draft release ${TAG_NAME} (${release_id})."
          fi

          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"
          echo "release_is_draft=${release_is_draft}" >> "$GITHUB_OUTPUT"
          echo "reused_published_release=${reused_published_release}" >> "$GITHUB_OUTPUT"

  release_aarch64:
    needs: [tag_gate, prepare_release]
    if: needs.tag_gate.outputs.is_release == 'true'
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install

      - name: Validate Lemon Squeezy build configuration
        env:
          SYNCWATCHER_LEMON_SQUEEZY_STORE_ID: ${{ vars.SYNCWATCHER_LEMON_SQUEEZY_STORE_ID }}
          SYNCWATCHER_LEMON_SQUEEZY_PRODUCT_ID: ${{ vars.SYNCWATCHER_LEMON_SQUEEZY_PRODUCT_ID }}
        run: |
          test -n "$SYNCWATCHER_LEMON_SQUEEZY_STORE_ID" || {
            echo "Missing repo variable: SYNCWATCHER_LEMON_SQUEEZY_STORE_ID"
            exit 1
          }
          test -n "$SYNCWATCHER_LEMON_SQUEEZY_PRODUCT_ID" || {
            echo "Missing repo variable: SYNCWATCHER_LEMON_SQUEEZY_PRODUCT_ID"
            exit 1
          }

      - name: Prepare App Store Connect key
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf "%s" "$APPLE_API_PRIVATE_KEY" > "$RUNNER_TEMP/private_keys/AuthKey_$APPLE_API_KEY.p8"

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNCWATCHER_LEMON_SQUEEZY_STORE_ID: ${{ vars.SYNCWATCHER_LEMON_SQUEEZY_STORE_ID }}
          SYNCWATCHER_LEMON_SQUEEZY_PRODUCT_ID: ${{ vars.SYNCWATCHER_LEMON_SQUEEZY_PRODUCT_ID }}
          SYNCWATCHER_LEMON_SQUEEZY_VARIANT_ID: ${{ vars.SYNCWATCHER_LEMON_SQUEEZY_VARIANT_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_BUNDLER_DMG_IGNORE_CI: "true"
          VITE_LEMON_SQUEEZY_CHECKOUT_URL: ${{ vars.VITE_LEMON_SQUEEZY_CHECKOUT_URL }}
        with:
          releaseId: ${{ needs.prepare_release.outputs.release_id }}
          tagName: ${{ inputs.tag_name || github.ref_name }}
          releaseDraft: ${{ needs.prepare_release.outputs.release_is_draft == 'true' }}
          prerelease: ${{ needs.tag_gate.outputs.is_prerelease == 'true' }}
          args: --target aarch64-apple-darwin

  release_x64:
    needs: [tag_gate, prepare_release, release_aarch64]
    if: needs.tag_gate.outputs.is_release == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install

      - name: Validate Lemon Squeezy build configuration
        env:
          SYNCWATCHER_LEMON_SQUEEZY_STORE_ID: ${{ vars.SYNCWATCHER_LEMON_SQUEEZY_STORE_ID }}
          SYNCWATCHER_LEMON_SQUEEZY_PRODUCT_ID: ${{ vars.SYNCWATCHER_LEMON_SQUEEZY_PRODUCT_ID }}
        run: |
          test -n "$SYNCWATCHER_LEMON_SQUEEZY_STORE_ID" || {
            echo "Missing repo variable: SYNCWATCHER_LEMON_SQUEEZY_STORE_ID"
            exit 1
          }
          test -n "$SYNCWATCHER_LEMON_SQUEEZY_PRODUCT_ID" || {
            echo "Missing repo variable: SYNCWATCHER_LEMON_SQUEEZY_PRODUCT_ID"
            exit 1
          }

      - name: Prepare App Store Connect key
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf "%s" "$APPLE_API_PRIVATE_KEY" > "$RUNNER_TEMP/private_keys/AuthKey_$APPLE_API_KEY.p8"

      - name: Build and upload x64 release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNCWATCHER_LEMON_SQUEEZY_STORE_ID: ${{ vars.SYNCWATCHER_LEMON_SQUEEZY_STORE_ID }}
          SYNCWATCHER_LEMON_SQUEEZY_PRODUCT_ID: ${{ vars.SYNCWATCHER_LEMON_SQUEEZY_PRODUCT_ID }}
          SYNCWATCHER_LEMON_SQUEEZY_VARIANT_ID: ${{ vars.SYNCWATCHER_LEMON_SQUEEZY_VARIANT_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_BUNDLER_DMG_IGNORE_CI: "true"
          VITE_LEMON_SQUEEZY_CHECKOUT_URL: ${{ vars.VITE_LEMON_SQUEEZY_CHECKOUT_URL }}
        with:
          releaseId: ${{ needs.prepare_release.outputs.release_id }}
          tagName: ${{ inputs.tag_name || github.ref_name }}
          releaseDraft: ${{ needs.prepare_release.outputs.release_is_draft == 'true' }}
          prerelease: ${{ needs.tag_gate.outputs.is_prerelease == 'true' }}
          includeUpdaterJson: false
          args: --target x86_64-apple-darwin

  merge_latest_json:
    needs: [tag_gate, prepare_release, release_aarch64, release_x64]
    if: needs.tag_gate.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rebuild updater metadata from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p latest-json-assets
          gh release download "$TAG_NAME" \
            --pattern "*.app.tar.gz" \
            --pattern "*.app.tar.gz.sig" \
            --dir latest-json-assets

          aarch64_bundle="$(find latest-json-assets -maxdepth 1 -type f -name '*aarch64.app.tar.gz' | head -n 1)"
          x64_bundle="$(find latest-json-assets -maxdepth 1 -type f -name '*x64.app.tar.gz' | head -n 1)"
          aarch64_sig="$(find latest-json-assets -maxdepth 1 -type f -name '*aarch64.app.tar.gz.sig' | head -n 1)"
          x64_sig="$(find latest-json-assets -maxdepth 1 -type f -name '*x64.app.tar.gz.sig' | head -n 1)"

          test -n "$aarch64_bundle" && test -n "$x64_bundle" && test -n "$aarch64_sig" && test -n "$x64_sig" || {
            echo "Missing updater bundle or signature assets for one or more macOS architectures."
            exit 1
          }

          aarch64_bundle_name="$(basename "$aarch64_bundle")"
          x64_bundle_name="$(basename "$x64_bundle")"
          aarch64_signature="$(tr -d '\n' < "$aarch64_sig")"
          x64_signature="$(tr -d '\n' < "$x64_sig")"
          release_url="https://github.com/${GH_REPO}/releases/download/${TAG_NAME}"
          now_utc="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          jq -n \
            --arg version "${TAG_NAME#v}" \
            --arg notes "See the assets to download this version and install." \
            --arg pub_date "$now_utc" \
            --arg aarch64_bundle_name "$aarch64_bundle_name" \
            --arg x64_bundle_name "$x64_bundle_name" \
            --arg aarch64_signature "$aarch64_signature" \
            --arg x64_signature "$x64_signature" \
            --arg release_url "$release_url" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $aarch64_signature,
                  url: ($release_url + "/" + $aarch64_bundle_name)
                },
                "darwin-aarch64-app": {
                  signature: $aarch64_signature,
                  url: ($release_url + "/" + $aarch64_bundle_name)
                },
                "darwin-x86_64": {
                  signature: $x64_signature,
                  url: ($release_url + "/" + $x64_bundle_name)
                },
                "darwin-x86_64-app": {
                  signature: $x64_signature,
                  url: ($release_url + "/" + $x64_bundle_name)
                }
              }
            }' > latest.json

          gh release upload "$TAG_NAME" latest.json --clobber

  sbom_and_attest:
    needs: [tag_gate, prepare_release, release_aarch64, release_x64, merge_latest_json]
    if: needs.tag_gate.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
      RELEASE_CHANNEL: ${{ needs.tag_gate.outputs.release_channel }}
      REQUESTED_COSIGN_ATTESTATION: ${{ vars.ENABLE_COSIGN_ATTESTATION || 'false' }}
      ENABLE_COSIGN_ATTESTATION: ${{ needs.tag_gate.outputs.release_channel == 'stable' && 'true' || vars.ENABLE_COSIGN_ATTESTATION || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve release attestation policy
        run: |
          echo "release_channel=${RELEASE_CHANNEL}"
          echo "requested_attestation=${REQUESTED_COSIGN_ATTESTATION}"
          echo "effective_attestation=${ENABLE_COSIGN_ATTESTATION}"
          if [[ "$RELEASE_CHANNEL" == "stable" && "$ENABLE_COSIGN_ATTESTATION" != "true" ]]; then
            echo "Internal error: stable releases must force ENABLE_COSIGN_ATTESTATION=true."
            exit 1
          fi

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (CycloneDX / SPDX)
        run: |
          syft scan . \
            -o cyclonedx-json=sbom-${TAG_NAME}.cdx.json \
            -o spdx-json=sbom-${TAG_NAME}.spdx.json

      - name: Upload SBOM assets to release
        run: |
          gh release upload "$TAG_NAME" \
            "sbom-${TAG_NAME}.cdx.json" \
            "sbom-${TAG_NAME}.spdx.json" \
            --clobber

      - name: Download release artifacts
        id: prepare_release_assets
        run: |
          mkdir -p release-assets
          gh release download "$TAG_NAME" --dir release-assets
          mapfile -t artifacts < <(find release-assets -maxdepth 1 -type f \( -name "*.dmg" -o -name "*.app.tar.gz" \) | sort)
          if [[ "${#artifacts[@]}" -eq 0 ]]; then
            echo "No DMG or app tarball artifacts found."
            exit 1
          fi
          printf '%s\n' "${artifacts[@]}" > release-artifacts.txt
          echo "artifact_count=${#artifacts[@]}" >> "$GITHUB_OUTPUT"

      - name: Generate release checksums
        run: |
          checksum_file="checksums-${TAG_NAME}.txt"
          : > "$checksum_file"
          while IFS= read -r artifact; do
            file_name="$(basename "$artifact")"
            file_sha256="$(sha256sum "$artifact" | awk '{print $1}')"
            printf '%s  %s\n' "$file_sha256" "$file_name" >> "$checksum_file"
          done < release-artifacts.txt

      - name: Upload checksum asset
        run: |
          gh release upload "$TAG_NAME" "checksums-${TAG_NAME}.txt" --clobber

      - name: Install Cosign
        if: env.ENABLE_COSIGN_ATTESTATION == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Generate keyless cosign attestations
        if: env.ENABLE_COSIGN_ATTESTATION == 'true'
        run: |
          while IFS= read -r artifact; do
            file_name="$(basename "$artifact")"
            file_sha256="$(sha256sum "$artifact" | awk '{print $1}')"
            predicate_file="attestation-${file_name}.predicate.json"
            bundle_file="attestation-${file_name}.bundle.json"

            cat > "$predicate_file" <<EOF
          {
            "buildType": "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml",
            "invocation": {
              "runId": "${GITHUB_RUN_ID}",
              "runAttempt": "${GITHUB_RUN_ATTEMPT}",
              "ref": "${GITHUB_REF}",
              "sha": "${GITHUB_SHA}"
            },
            "subject": {
              "name": "${file_name}",
              "digest": {
                "sha256": "${file_sha256}"
              }
            },
            "sbom": [
              "sbom-${TAG_NAME}.cdx.json",
              "sbom-${TAG_NAME}.spdx.json"
            ],
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

            cosign attest-blob \
              --yes \
              --oidc-provider github-actions \
              --predicate "$predicate_file" \
              --type https://syncwatcher.dev/attestation/release-asset/v1 \
              --bundle "$bundle_file" \
              "$artifact"
          done < release-artifacts.txt

      - name: Upload attestation bundles to release
        if: env.ENABLE_COSIGN_ATTESTATION == 'true'
        run: |
          gh release upload "$TAG_NAME" attestation-*.bundle.json --clobber

  refresh_release_notes:
    needs: [tag_gate, prepare_release, release_aarch64, release_x64, merge_latest_json, sbom_and_attest]
    if: needs.tag_gate.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Regenerate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail

          generated_notes="$(gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            "repos/${GH_REPO}/releases/generate-notes" \
            -f tag_name="${TAG_NAME}")"

          generated_title="$(jq -r '.name' <<<"$generated_notes")"
          notes_file="$(mktemp)"
          {
            echo "Installer assets, updater metadata, checksums, and attestations are attached below."
            echo
            jq -r '.body' <<<"$generated_notes"
          } > "$notes_file"

          gh release edit "$TAG_NAME" \
            --title "$generated_title" \
            --notes-file "$notes_file"

  publish_release:
    needs: [tag_gate, prepare_release, release_aarch64, release_x64, merge_latest_json, sbom_and_attest, refresh_release_notes]
    if: needs.tag_gate.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        if: needs.prepare_release.outputs.release_is_draft == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
          IS_PRERELEASE: ${{ needs.tag_gate.outputs.is_prerelease }}
        run: |
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            gh release edit "$TAG_NAME" --draft=false --prerelease
          else
            gh release edit "$TAG_NAME" --draft=false
          fi

      - name: Skip publish for published-release recovery
        if: needs.prepare_release.outputs.release_is_draft != 'true'
        env:
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          echo "Skipping publish step because ${TAG_NAME} was already published before this recovery run."
