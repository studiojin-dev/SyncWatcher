name: Update Download Badge

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  update_download_badge:
    if: github.event_name != 'release' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Build installer download badge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: node scripts/metrics/build-installer-download-badge.mjs

      - name: Commit badge update
        run: |
          if git diff --quiet -- docs/badges/installer-downloads.json; then
            echo "No badge changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/badges/installer-downloads.json
          git commit -m "chore: update installer download badge"
          git push origin HEAD:main
